# Gossip spread rules by relationship type
gossip_rules:
  friend:
    spreadRate: 0.5
    delayDays: 0
    accuracy: 0.95

  closeFriend:
    spreadRate: 0.7
    delayDays: 0
    accuracy: 1.0

  mentor:
    spreadRate: 0.4
    delayDays: 1
    accuracy: 0.9

  rival:
    spreadRate: 0.3
    delayDays: 2
    accuracy: 0.7

  neutral:
    spreadRate: 0.1
    delayDays: 3
    accuracy: 0.6

  enemy:
    spreadRate: 0.0
    delayDays: 0
    accuracy: 0.5

# NPC Archetypes for reference
# Gustav  - Mentor (patient, wise, encouraging)
# Riley   - Competitor (ambitious, driven, competitive)
# Gus     - Merchant (practical, deal-maker, shrewd)
# NanaKiko - Mystic (enigmatic, hints, knows hidden things)
# Bella   - Socialite (friendly, talkative, knows everyone)
